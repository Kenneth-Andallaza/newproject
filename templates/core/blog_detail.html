{% extends 'base.html' %}
{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10" data-aos="fade-up">
            <div class="mb-4 text-muted">{{ post.published_at|date:'F d, Y' }} • {{ post.author }}</div>
            <h1 class="fw-bold">{{ post.title }}</h1>
            <p class="text-muted">{{ post.excerpt }}</p>
            {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}" class="img-fluid rounded-4 shadow-sm my-4">
            {% endif %}
            <div class="text-muted fs-5">{{ post.content }}</div>
            <a href="{% url 'blog-list' %}" class="btn btn-outline-primary rounded-pill mt-4">Back to blog</a>
        </div>
    </div>
</section>
{% endblock %}
