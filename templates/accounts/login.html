{% extends 'base.html' %}
{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5" data-aos="fade-up">
            <div class="card rounded-4 shadow-sm border-0 p-4">
                <h2 class="fw-bold mb-3">Login to ServiceHub</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">{{ form.username.label_tag }}{{ form.username }}</div>
                    <div class="mb-3">{{ form.password.label_tag }}{{ form.password }}</div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill">Login</button>
                        <a href="{% url 'register' %}" class="btn btn-outline-secondary rounded-pill">Create account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
