{% extends 'base.html' %}
{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6" data-aos="fade-up">
            <div class="card rounded-4 shadow-sm border-0 p-4">
                <h2 class="fw-bold mb-4">Change password</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">{{ form.old_password.label_tag }}{{ form.old_password }}</div>
                    <div class="mb-3">{{ form.new_password1.label_tag }}{{ form.new_password1 }}</div>
                    <div class="mb-3">{{ form.new_password2.label_tag }}{{ form.new_password2 }}</div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Update password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
